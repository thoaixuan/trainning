<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <script src="https://unpkg.com/vue@3"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Vuejs</title>
</head>

<body>
    <div class="p-4" id="app">
        <div v-if="yeuthich">
            Ghim dữ liệu
            <table class="table table-bordered table-dark table-striped">
                <thead>
                    <tr>
                        <th>language</th>
                        <th>region</th>
                        <th>quoteType</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="(value,index) in yeuthich" :key="index">
                        <td v-text="value[0]"></td>
                        <td v-text="value[1]"></td>
                        <td v-text="value[2]"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <table class="table table-bordered table-dark table-striped">
            <thead>
                <tr>{{localTime}}
                    <div id="app">{{ noidung }}</div>
                    <th>language</th>
                    <th>region</th>
                    <th>quoteType</th>
                    <th class="text-center">Theo dõi</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="(item,index) in laguages" :key="index">
                    <td v-text="item.language"></td>
                    <td v-text="item.region"></td>
                    <td v-text="item.quoteType"></td>
                    <td class="text-center" v-on:click="theoDoi(item.language,item.region,item.quoteType)">Ghim</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="index.js">
</script>


</html>
